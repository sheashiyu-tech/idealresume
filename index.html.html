<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>理想毕业简历模板</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f0; color: #1a1a18; padding: 2rem 1rem; min-height: 100vh; }
  .page { max-width: 720px; margin: 0 auto; }
  .card { background: #ffffff; border: 0.5px solid #d3d1c7; border-radius: 12px; padding: 1.5rem 2rem; }
  .hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .hdr-title { font-size: 20px; font-weight: 500; color: #1a1a18; }
  .badge { font-size: 12px; padding: 4px 10px; border-radius: 8px; background: #EEEDFE; color: #3C3489; border: 0.5px solid #AFA9EC; }
  .sec-label { font-size: 12px; color: #5f5e5a; margin-bottom: 8px; letter-spacing: 0.03em; }
  .divider { border: none; border-top: 0.5px solid #d3d1c7; margin: 1.25rem 0; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: #5f5e5a; }
  .field input, .field select, .field textarea {
    font-size: 13px; color: #1a1a18;
    background: #f5f5f0;
    border: 0.5px solid #b4b2a9;
    border-radius: 8px;
    padding: 8px 10px;
    width: 100%;
    resize: none;
    font-family: inherit;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: #7F77DD; background: #fff;
  }
  .field textarea { min-height: 72px; line-height: 1.6; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .row-items { display: flex; flex-direction: column; gap: 8px; }
  .row-item { display: grid; grid-template-columns: 2fr 3fr; gap: 10px; align-items: start; }
  .highlight-card { background: #FAEEDA; border: 0.5px solid #EF9F27; border-radius: 12px; padding: 1rem 1.25rem; }
  .highlight-label { font-size: 12px; color: #633806; font-weight: 500; margin-bottom: 8px; }
  .highlight-card .field label { color: #854F0B; }
  .highlight-card .field textarea { background: #ffffff; border-color: #EF9F27; min-height: 60px; }
  .section { margin-bottom: 1.25rem; }
  @media (max-width: 540px) {
    .grid2, .grid3 { grid-template-columns: 1fr; }
    .row-item { grid-template-columns: 1fr; }
    .card { padding: 1.25rem 1rem; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="hdr">
      <span class="hdr-title">理想毕业简历</span>
      <span class="badge">课前完成</span>
    </div>

    <div class="section">
      <div class="sec-label">基本定位</div>
      <div class="grid3">
        <div class="field"><label>目标城市</label><input type="text" placeholder="如：上海、广州、成都…"/></div>
        <div class="field"><label>目标行业</label><input type="text" placeholder="如：互联网、金融、教育…"/></div>
        <div class="field"><label>目标岗位</label><input type="text" placeholder="如：产品经理、运营…"/></div>
      </div>
      <div class="grid2">
        <div class="field"><label>预期月薪（税前，元）</label><input type="text" placeholder="如：8000、12000…"/></div>
        <div class="field">
          <label>工作性质偏好</label>
          <select>
            <option value="">请选择</option>
            <option>大厂/国企 — 稳定平台</option>
            <option>中小企业 — 成长空间</option>
            <option>创业公司 — 快节奏挑战</option>
            <option>体制内 — 公务员/事业单位</option>
            <option>自由职业/副业</option>
          </select>
        </div>
      </div>
    </div>

    <hr class="divider"/>

    <div class="section">
      <div class="sec-label">实习经历（写你希望毕业时拥有的，填1～3段）</div>
      <div class="row-items">
        <div class="row-item">
          <div class="field"><label>公司/机构名称</label><input type="text" placeholder="实习单位"/></div>
          <div class="field"><label>岗位与主要内容（一句话）</label><input type="text" placeholder="如：字节跳动产品实习，负责用户增长专项"/></div>
        </div>
        <div class="row-item">
          <div class="field"><label>公司/机构名称</label><input type="text" placeholder="实习单位"/></div>
          <div class="field"><label>岗位与主要内容（一句话）</label><input type="text" placeholder=""/></div>
        </div>
        <div class="row-item">
          <div class="field"><label>公司/机构名称</label><input type="text" placeholder="实习单位（选填）"/></div>
          <div class="field"><label>岗位与主要内容（一句话）</label><input type="text" placeholder=""/></div>
        </div>
      </div>
    </div>

    <hr class="divider"/>

    <div class="section">
      <div class="sec-label">技能与证书</div>
      <div class="grid2">
        <div class="field">
          <label>专业技能（用逗号分隔）</label>
          <input type="text" placeholder="如：Python、Figma、财务建模、视频剪辑…"/>
        </div>
        <div class="field">
          <label>证书/资质</label>
          <input type="text" placeholder="如：CET-6、CFA一级、教师资格证…"/>
        </div>
      </div>
    </div>

    <hr class="divider"/>

    <div class="section">
      <div class="sec-label">项目/作品</div>
      <div class="field">
        <label>希望毕业时能拿出手的项目或作品（简单描述）</label>
        <textarea placeholder="如：独立完成过一个小程序开发、参与过校级创业大赛并获奖、有公开发表的文章或设计作品…"></textarea>
      </div>
    </div>

    <hr class="divider"/>

    <div class="highlight-card">
      <div class="highlight-label">反推：现在距离这份简历，还差什么？</div>
      <div class="grid2">
        <div class="field">
          <label>最缺的一项经历</label>
          <textarea placeholder="如：完全没有相关实习，不知道从哪找…"></textarea>
        </div>
        <div class="field">
          <label>最需要补的一项能力</label>
          <textarea placeholder="如：英语口语很弱，但目标岗位要求高…"></textarea>
        </div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
